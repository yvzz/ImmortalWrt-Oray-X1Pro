name: Build ImmortalWrt for X1Pro

permissions:
  contents: write

on:
  # push:
  #   branches: [ main, master ]
  workflow_dispatch:
    inputs:
      verbose:
        description: '启用详细编译日志 V=s（出错调试用）'
        required: false
        type: boolean
        default: false
      publish:
        description: '发布编译产物到 Release'
        required: false
        type: boolean
        default: true
  schedule:
    - cron: 0 19 * * *  
  repository_dispatch:
    types: [ "X1Pro Update" ]

env:
  TZ: Asia/Shanghai
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_CONFIGPATH: ${{ github.workspace }}/.ccache.conf
  CCACHE_MAXSIZE: 2G

jobs:
  build:
    name: Build X1Pro Firmware
    runs-on: ubuntu-24.04

    steps:
      - name: Check Server Performance
        run: |
          echo "警告⚠"
          echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
          echo -e "已知CPU型号(降序): 9V74、7763、6973P-C、8370C、8272CL、8171M、E5-2673\n"
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo -e "CPU型号信息:$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')\n"
          echo "--------------------------内存信息--------------------------"
          echo "已安装内存详细信息:"
          echo -e "$(sudo lshw -short -C memory | grep GiB)\n"
          echo "--------------------------硬盘信息--------------------------"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: Checkout
        uses: actions/checkout@v7

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gawk unzip file wget python3 \
            python3-pip python3-setuptools python3-yaml \
            rsync curl git \
            libncurses-dev libssl-dev libelf-dev \
            zlib1g-dev time subversion gettext patch perl \
            squashfs-tools \
            python3-ply python3-docutils python3-pyelftools \
            ccache jq
          pip3 install pyelftools --break-system-packages 2>/dev/null || true
          sudo timedatectl set-timezone "$TZ"

      - name: Prepare feeds for cache key
        id: feeds
        run: |
          # 用 ls-remote 取稳定 commit SHA，避免 git clone --depth=1 每次 SHA 不同导致 cache key 不稳定
          FEEDS_PACKAGES=$(git ls-remote https://github.com/immortalwrt/packages.git openwrt-24.10 | cut -f1)
          FEEDS_LUCI=$(git ls-remote https://github.com/immortalwrt/luci.git openwrt-24.10 | cut -f1)
          FEEDS_ISTORE=$(git ls-remote https://github.com/linkease/istore.git master | cut -f1)
          FEEDS_HASH=$(echo "$FEEDS_PACKAGES $FEEDS_LUCI $FEEDS_ISTORE" | sha256sum | cut -d' ' -f1)
          echo "feeds_hash=$FEEDS_HASH" >> $GITHUB_OUTPUT

          git clone --depth=1 https://github.com/immortalwrt/packages.git --branch openwrt-24.10 feeds/packages
          git clone --depth=1 https://github.com/immortalwrt/luci.git --branch openwrt-24.10 feeds/luci
          git clone --depth=1 https://github.com/linkease/istore.git feeds/istore

      - name: Clone source
        run: |
          git clone --depth=1 https://github.com/yvzz/immortalwrt-mt798x-6.6 source

      - name: Setup ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          # 强制 ccache 读取我们可控的配置文件（绝对路径），避免 runner 镜像默认
          # /workdir/.ccache 不可写、且 HOME 漂移导致用户配置读不到的问题
          export CCACHE_CONFIGPATH="$CCACHE_CONFIGPATH"
          ccache --set-config=cache_dir="$CCACHE_DIR"
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=compression=true
          ccache -z

      - name: Cache
        uses: actions/cache@v6
        with:
          path: |
            source/dl
            source/staging_dir
            ${{ github.workspace }}/.ccache
          key: build-cache-${{ hashFiles('feeds.conf.default', '.github/workflows/Build-ImmortalWrt.yml') }}-${{ steps.feeds.outputs.feeds_hash }}-${{ runner.os }}
          restore-keys: build-cache-${{ runner.os }}-

      - name: Apply patches
        working-directory: source
        run: |
          # feeds.conf.default 注入到源码，feeds 本身在 Prepare feeds 步骤已克隆到 source/
          cp $GITHUB_WORKSPACE/feeds.conf.default .

      - name: Update & Install feeds
        working-directory: source
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        working-directory: source
        run: |
          cp $GITHUB_WORKSPACE/config/X1Pro.config .config
          sed -i "/CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_/d" .config
          sed -i "/CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_/d" .config
          echo "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_oray_x1pro-v1-ubootmod=y" >> .config
          echo "CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_oray_x1pro-v1-ubootmod=\"kmod-usb3 kmod-mt7915e kmod-mt7981-firmware mt7981-wo-firmware automount\"" >> .config
          chmod +x $GITHUB_WORKSPACE/diy-part1.sh
          $GITHUB_WORKSPACE/diy-part1.sh
          chmod +x $GITHUB_WORKSPACE/diy-part2.sh
          $GITHUB_WORKSPACE/diy-part2.sh
          make defconfig

      - name: Build
        id: compile
        working-directory: source
        env:
          CC: ccache gcc
          CXX: ccache g++
          CCACHE_COMPRESS: 1
          CCACHE_CONFIGPATH: ${{ github.workspace }}/.ccache.conf
        run: |
          # GitHub 免费 runner 只有 7GB RAM，编译大量包容易 OOM
          # 增加 4GB swap + 限制并行数为 4 核
          sudo fallocate -l 4G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          NPROC=$(($(/usr/bin/nproc) > 4 ? 4 : $(/usr/bin/nproc)))
          echo "CPU: $(/usr/bin/nproc) cores, using -j${NPROC}"

          # 预下载所有依赖（减少编译中断）
          /usr/bin/make download -j${NPROC}

          # binutils-2.42 readelf.c 使用了 glibc 专有的 off64_t / fseeko64，
          # musl libc 不支持，直接 patch 源码用 off_t / fseeko 替代
          /usr/bin/make toolchain/binutils/prepare V=s 2>/dev/null || true
          for rf in build_dir/toolchain-*/binutils-*/binutils/readelf.c; do
            if [ -f "$rf" ]; then
              sed -i 's/off64_t/off_t/g; s/fseeko64/fseeko/g' "$rf"
              echo "Patched $rf"
            fi
          done

          # 编译，始终保留完整日志
          if [ "${{ inputs.verbose }}" = "true" ]; then
            /usr/bin/make -j${NPROC} V=s 2>&1 | tee build.log
          else
            /usr/bin/make -j${NPROC} 2>&1 | tee build.log
          fi

          # 验证固件是否生成
          SYSUPGRADE=$(find bin/targets -name "*oray_x1pro-v1-ubootmod*sysupgrade.bin" 2>/dev/null | head -1)
          if [ -n "$SYSUPGRADE" ]; then
            echo "Firmware built: $SYSUPGRADE ($(du -h "$SYSUPGRADE" | cut -f1))"
            echo "name=$(basename "$SYSUPGRADE")" >> $GITHUB_OUTPUT
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "=== BUILD FAILED — extracting errors from build.log ==="
            grep -iE "error[: ]|Error 1|Error 2|failed to|cannot find|No such file|undefined reference|No rule to make" build.log | tail -100 || echo "(no error patterns found)"
            echo ""
            echo "=== Last 200 lines of build.log ==="
            tail -200 build.log || true
            echo "ERROR: No firmware found!"
            find bin/targets -name "*.bin" 2>/dev/null | head -10
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

          df -hT /home/runner/work

      - name: List build artifacts
        run: |
          echo "=== Firmware artifacts ==="
          find source/bin/targets -name "*oray_x1pro-v1-ubootmod*" 2>/dev/null | while read f; do
            echo "  $(basename $f) ($(du -h "$f" | cut -f1))"
          done

      - name: Set build info
        id: info
        run: |
          BUILD_DATE=$(date +%Y%m%d)
          BUILD_TIME=$(date +%H%M)
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

      - name: Upload build.log (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: source/build.log
          retention-days: 7

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: ImmortalWrt_X1Pro-${{ steps.info.outputs.build_date }}-${{ steps.info.outputs.build_time }}-oray_x1pro-v1-ubootmod
          path: source/bin/targets/mediatek/filogic/*oray_x1pro-v1-ubootmod*squashfs-sysupgrade.bin
          retention-days: 30

      - name: Create Release
        if: inputs.publish == true || github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          tag_name: v${{ steps.info.outputs.build_date }}-${{ steps.info.outputs.build_time }}
          name: ImmortalWrt X1Pro ${{ steps.info.outputs.build_date }}-${{ steps.info.outputs.build_time }}
          generate_release_notes: true
          files: |
            source/bin/targets/mediatek/filogic/*oray_x1pro-v1-ubootmod*squashfs-sysupgrade.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
